name = "loter-ia-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "loter-ia-db"
database_id = "e23960be-21f1-4b15-8d9c-124f2fb85377"

[vars]
ENVIRONMENT = "production"
APP_URL = "https://loteriasdehoy.pro"
FROM_EMAIL = "noreply@loteriasdehoy.pro"

# Custom domain — api.loteriasdehoy.pro
[[routes]]
pattern = "api.loteriasdehoy.pro"
custom_domain = true

# Cron Triggers — lottery data ingestion (Colombia)
# Scrapes loteriasdehoy.co for premio mayor + secos.
# Runs at 11:30 PM and 1:00 AM Colombia time (04:30 and 06:00 UTC)
# to capture results after the draw (~10:30 PM COL).
# Duplicates are safely skipped via INSERT OR IGNORE.
[triggers]
crons = ["30 4 * * *", "0 6 * * *"]

# Secrets (set via: wrangler secret put <SECRET_NAME>):
# JWT_SECRET              — secret for signing JWTs
