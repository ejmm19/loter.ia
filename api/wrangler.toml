name = "loter-ia-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "loter-ia-db"
database_id = "e23960be-21f1-4b15-8d9c-124f2fb85377"

[vars]
ENVIRONMENT = "production"
APP_URL = "https://loter-ia.pages.dev"
FROM_EMAIL = "noreply@loter.ia"

# Cron Triggers — daily lottery data ingestion (Colombia)
# 06:00 UTC: ingest new draw results
[triggers]
crons = ["0 6 * * *"]

# Secrets (set via: wrangler secret put <SECRET_NAME>):
# OPENAI_API_KEY          — OpenAI API key for AI predictions
# JWT_SECRET              — secret for signing JWTs
# LOTTERY_FEED_URL        — optional JSON feed base URL for automatic draw ingestion
# STRIPE_SECRET_KEY       — Stripe secret key (sk_live_... or sk_test_...)
# STRIPE_WEBHOOK_SECRET   — Stripe webhook signing secret (whsec_...)
# RESEND_API_KEY          — Resend API key for transactional email
