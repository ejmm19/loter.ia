<div class="min-h-screen bg-gradient-to-br from-brand-900 via-brand-800 to-accent-600 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-flex items-center gap-2">
        <span class="text-4xl font-extrabold text-white tracking-tight">loter<span class="text-accent-400">.ia</span></span>
      </a>
      <p class="mt-2 text-brand-200 text-sm">Crea tu cuenta gratis</p>
    </div>

    <div class="card shadow-2xl">
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Crear cuenta</h1>

      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="submit()" #f="ngForm" class="space-y-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input
            id="name"
            type="text"
            name="name"
            [(ngModel)]="name"
            required
            autocomplete="name"
            placeholder="Tu nombre"
            class="input-field"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="email"
            placeholder="tu@email.com"
            class="input-field"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input
            id="password"
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            minlength="8"
            autocomplete="new-password"
            placeholder="Mínimo 8 caracteres"
            class="input-field"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading() || !name || !email || !password"
          class="btn-primary w-full mt-2"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            Creando cuenta...
          } @else {
            Crear cuenta gratis
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-600">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-brand-600 font-medium hover:text-brand-700">Inicia sesión</a>
      </p>

      <p class="mt-4 text-center text-xs text-gray-400">
        Al registrarte aceptas nuestros términos. Las predicciones son solo orientativas — juega responsablemente.
      </p>
    </div>
  </div>
</div>
