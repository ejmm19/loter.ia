<div class="min-h-screen bg-gradient-to-br from-brand-900 via-brand-800 to-accent-600 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-flex items-center gap-2">
        <span class="text-4xl font-extrabold text-white tracking-tight">loter<span class="text-accent-400">.ia</span></span>
      </a>
      <p class="mt-2 text-brand-200 text-sm">Predicciones con inteligencia artificial</p>
    </div>

    <div class="card shadow-2xl">
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Iniciar sesión</h1>

      @if (error()) {
        <div data-testid="error-message" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="submit()" #f="ngForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            id="email"
            data-testid="email-input"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="email"
            placeholder="tu@email.com"
            class="input-field"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input
            id="password"
            data-testid="password-input"
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
            class="input-field"
          />
        </div>

        <button
          type="submit"
          data-testid="login-submit"
          [disabled]="loading() || !email || !password"
          class="btn-primary w-full mt-2"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            Iniciando sesión...
          } @else {
            Iniciar sesión
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-600">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-brand-600 font-medium hover:text-brand-700">Regístrate gratis</a>
      </p>
    </div>
  </div>
</div>
